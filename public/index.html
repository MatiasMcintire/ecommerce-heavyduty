<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecommerce UCT - Tienda Online</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">🛒 Ecommerce UCT</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="#" id="linkCatalogo">Catálogo</a></li>
        <li class="nav-item"><a class="nav-link" href="#" id="linkCarrito">Carrito <span id="carritoCount" class="badge bg-success">0</span></a></li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="#" id="linkLogin">Iniciar Sesión</a></li>
        <li class="nav-item"><a class="nav-link" href="#" id="linkRegistro">Registrarse</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container mt-4" id="mainContent">
  <h1>Bienvenido a Ecommerce UCT</h1>
  <p class="lead">Proyecto integrador - Diseño y Desarrollo de Software + IA</p>
  <div class="row" id="productosContainer"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/catalogo.js"></script>
<script src="js/carrito.js"></script>
<script src="js/auth.js"></script>
<script src="js/checkout.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    if (typeof App !== 'undefined') App.init();
    if (typeof Catalogo !== 'undefined') Catalogo.cargarDestacados();
});
</script>
</body>
</html>
